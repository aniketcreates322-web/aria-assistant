version: '3.8'\n\nservices:\n  aria:\n    build: .\n    container_name: aria-assistant\n    ports:\n      - \"3000:3000\"\n    environment:\n      - NODE_ENV=production\n      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}\n      - PORT=3000\n    volumes:\n      - ./logs:/app/logs\n    restart: unless-stopped\n    healthcheck:\n      test: [\"CMD\", \"curl\", \"-f\", \"http://localhost:3000/api/health\"]\n      interval: 30s\n      timeout: 10s\n      retries: 3\n      start_period: 5s\n